name: CI and Manual Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: What should be deployed after verification?
        required: true
        default: verify-only
        type: choice
        options:
          - verify-only
          - frontend
          - all

# push / PR 自動跑 CI；部署只允許從 GitHub Actions 手動觸發。
concurrency:
  group: ci-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: graduation-6ae65
  GCP_REGION: asia-east1
  CLOUD_RUN_SERVICE: phubbing-backend
  IMAGE: asia-east1-docker.pkg.dev/graduation-6ae65/cloud-run-source-deploy/phubbing-backend

jobs:
  # ── CI gate: push、PR、手動部署都必須先通過 ──
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run frontend unit tests
        run: npm test

      - name: Check JavaScript syntax
        run: find frontend tests -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check Python syntax
        run: python -m py_compile backend/*.py

      - name: Run backend unit tests
        run: python -m unittest discover -s backend/tests -v

  # ── Frontend: Firebase Hosting ──
  deploy-frontend:
    needs: verify
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.deploy_target == 'frontend' || inputs.deploy_target == 'all')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Hosting and security rules
        run: npx firebase-tools deploy --only hosting,firestore:rules,storage --project ${{ env.GCP_PROJECT_ID }} --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

  # ── Backend: Cloud Run ──
  deploy-backend:
    needs: verify
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # base image 以 Dockerfile 的 FROM 為唯一來源（已釘死 digest），
      # 避免這裡另外寫一份浮動 tag 而與 Dockerfile 不同步。
      - name: Pull base image (retry up to 3x)
        run: |
          BASE=$(awk '/^FROM /{print $2; exit}' backend/Dockerfile)
          echo "Base image: $BASE"
          for i in 1 2 3; do
            docker pull "$BASE" && break
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE }}:latest \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --min-instances 1 \
            --max-instances 1 \
            --quiet

      - name: Route traffic to latest Cloud Run revision
        run: |
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --to-latest \
            --quiet
