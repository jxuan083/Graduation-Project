<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社交定錨 | Phubbing Anchor</title>

    <!-- 共用樣式 (依 v=18 為新版號) -->
    <link rel="stylesheet" href="./styles/base.css?v=20">
    <link rel="stylesheet" href="./styles/components.css?v=20">
    <link rel="stylesheet" href="./styles/social.css?v=20">
    <link rel="stylesheet" href="./styles/taboo.css?v=20">

    <!-- Firebase (compat 全域) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <!-- QR Code 掃描 + Lottie -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- 頂部使用者狀態列 (常駐,所有頁面都看得到) -->
        <header id="auth-bar">
            <div id="auth-logged-out">
                <button id="btn-google-login" class="btn-auth">使用 Google 登入</button>
                <button id="btn-open-about-guest" class="btn-auth btn-auth-small">關於</button>
            </div>
            <div id="auth-logged-in" style="display:none;">
                <button id="btn-user-menu-toggle" class="user-menu-toggle" aria-haspopup="true" aria-expanded="false">
                    <img id="auth-avatar" class="auth-avatar" src="" alt="avatar" />
                    <span id="auth-nickname" class="auth-nickname"></span>
                    <span id="menu-red-dot" class="menu-red-dot" style="display:none;"></span>
                    <span class="menu-caret">▾</span>
                </button>
                <div id="user-menu-dropdown" class="user-menu" style="display:none;">
                    <button id="btn-open-profile" class="user-menu-item">👤 個人資料</button>
                    <button id="btn-open-friends" class="user-menu-item">👥 好友 <span id="menu-friends-badge" class="menu-badge" style="display:none;">0</span></button>
                    <button id="btn-open-leaderboard" class="user-menu-item">🏆 排行榜</button>
                    <button id="btn-open-about" class="user-menu-item">ℹ️ 關於</button>
                    <div class="user-menu-sep"></div>
                    <button id="btn-logout" class="user-menu-item danger">🚪 登出</button>
                </div>
            </div>
        </header>

        <!-- 所有 view 會由 main.js 動態載入到這裡 -->
        <main id="app"></main>

        <!-- 底部版本 -->
        <footer id="app-footer">
            <span id="footer-version">Phubbing Anchor · 載入版本中…</span>
        </footer>

        <!-- Toast 提示容器 (浮於所有頁面上層) -->
        <div id="toast-container" class="toast-container"></div>

        <!-- 「返回聚會」浮動按鈕 -->
        <button id="btn-resume-meeting" class="btn-resume-meeting" style="display:none;">🔵 返回聚會</button>
    </div>

    <!-- App 進入點 (ES Module) -->
    <script type="module" src="./main.js?v=20"></script>
</body>
</html>
