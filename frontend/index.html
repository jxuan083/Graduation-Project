<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社交定錨 | Phubbing Anchor</title>

    <!-- PWA：可安裝到主畫面，是 iOS Web Push 能收到通知的前提 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icons/icon-192.png">
    <meta name="theme-color" content="#e87a41">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 字體：台北黑體 Taipei Sans TC（emfont CDN，woff2 + unicode-range 切片，含 300/400/700） -->
    <link rel="preconnect" href="https://font.emtech.cc" crossorigin>
    <link rel="stylesheet" href="https://font.emtech.cc/css/TaipeiSansTC">

    <!-- 共用樣式 (warm-campfire redesign v=28) -->
    <link rel="stylesheet" href="./styles/base.css?v=28">
    <link rel="stylesheet" href="./styles/components.css?v=28">
    <link rel="stylesheet" href="./styles/social.css?v=28">
    <link rel="stylesheet" href="./styles/taboo.css?v=28">
    <link rel="stylesheet" href="./styles/pet-tamagotchi.css?v=28">

    <!-- front-preview 淡色設計合併層（載入順序最後，覆蓋深色主題） -->
    <link rel="stylesheet" href="./styles/redesign.css?v=28">

    <!-- Firebase (compat 全域) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

    <!-- QR Code 掃描 + 產生 + Lottie -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- 頂部使用者狀態列 (常駐,所有頁面都看得到) -->
        <header id="auth-bar">
            <div id="lang-toggle" class="lang-toggle" role="group" aria-label="Language">
                <button type="button" data-lang="zh" class="lang-btn active">中</button>
                <button type="button" data-lang="en" class="lang-btn">EN</button>
            </div>
            <div id="auth-logged-out">
                <button id="btn-google-login" class="btn-auth">使用 Google 登入</button>
            </div>
            <div id="auth-logged-in" style="display:none;">
                <button id="btn-user-menu-toggle" class="user-menu-toggle" aria-haspopup="true" aria-expanded="false">
                    <img id="auth-avatar" class="auth-avatar" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="avatar" />
                    <span id="auth-nickname" class="auth-nickname"></span>
                    <span id="menu-red-dot" class="menu-red-dot" style="display:none;"></span>
                    <span class="menu-caret">▾</span>
                </button>
                <div id="user-menu-dropdown" class="user-menu" style="display:none;">
                    <button id="btn-open-profile" class="user-menu-item"><i data-lucide="user"></i> 個人資料</button>
                    <button id="btn-open-friends" class="user-menu-item"><i data-lucide="users"></i> 好友 <span id="menu-friends-badge" class="menu-badge" style="display:none;">0</span></button>
                    <button id="btn-open-my-pet" class="user-menu-item"><i data-lucide="paw-print"></i> 我的寵物</button>
                    <button id="btn-open-leaderboard" class="user-menu-item"><i data-lucide="trophy"></i> 排行榜</button>
                    <button id="btn-menu-meetings" class="user-menu-item"><i data-lucide="calendar"></i> 聚會紀錄</button>
                    <button id="btn-enable-push" class="user-menu-item"><i data-lucide="bell"></i> 開啟通知</button>
                    <div class="user-menu-sep"></div>
                    <button id="btn-logout" class="user-menu-item danger"><i data-lucide="log-out"></i> 登出</button>
                </div>
            </div>
        </header>

        <!-- 所有 view 會由 main.js 動態載入到這裡 -->
        <main id="app"></main>

        <!-- 底部版本 -->
        <footer id="app-footer">
            <span id="footer-version">Phubbing Anchor · 載入版本中…</span>
        </footer>

        <!-- Toast 提示容器 (浮於所有頁面上層) -->
        <div id="toast-container" class="toast-container"></div>

        <!-- 「返回聚會」浮動按鈕 -->
        <button id="btn-resume-meeting" class="btn-resume-meeting" style="display:none;"><i data-lucide="arrow-left"></i> 返回聚會</button>
    </div>

    <!-- App 進入點 (ES Module) -->
    <script type="module" src="./main.js?v=28"></script>
</body>
</html>
