<section id="view-pet-swap" class="view">
    <h2><i data-lucide="paw-print"></i> 寵物貼紙濾鏡</h2>
    <p class="hint pet-filter-subtitle">照片先在瀏覽器本機處理；只有你按「設為群組頭像」或「養它」時才會上傳。</p>

    <div class="summary-card pet-filter-card">
        <div class="pet-filter-stage" id="pet-filter-stage">
            <video id="pet-camera-video" class="pet-camera-video" autoplay muted playsinline></video>
            <canvas id="pet-filter-canvas" class="pet-filter-canvas" aria-label="寵物貼紙濾鏡預覽"></canvas>
            <div id="pet-upload-placeholder" class="pet-upload-placeholder">
                <i data-lucide="image-plus"></i>
                <span>選擇照片開始</span>
            </div>
            <div id="pet-loading" class="pet-filter-loading" style="display:none;">
                <div class="spinner"></div>
                <span>定位臉部中…</span>
            </div>
        </div>

        <div class="pet-filter-actions">
            <button id="btn-pet-camera" class="btn secondary"><i data-lucide="video"></i> 即時鏡頭</button>
            <button id="btn-pet-album" class="btn secondary"><i data-lucide="image"></i> 相簿</button>
            <button id="btn-pet-stop-camera" class="btn secondary" style="display:none;"><i data-lucide="video-off"></i> 停止</button>
        </div>
        <input id="pet-album-input" type="file" accept="image/*" style="display:none;" />

        <div class="pet-template-section">
            <p class="pet-filter-label">模板</p>
            <div id="pet-template-list" class="pet-template-list">
                <button class="pet-template-btn active" data-animal="dog">狗</button>
                <button class="pet-template-btn" data-animal="cat">貓</button>
                <button class="pet-template-btn" data-animal="rabbit">兔</button>
                <button class="pet-template-btn" data-animal="fox">狐</button>
            </div>
        </div>

        <div class="pet-filter-controls" id="pet-filter-controls" aria-label="濾鏡微調">
            <label>
                <span>大小</span>
                <input id="pet-control-scale" type="range" min="70" max="145" value="100" />
            </label>
            <label>
                <span>左右</span>
                <input id="pet-control-x" type="range" min="-120" max="120" value="0" />
            </label>
            <label>
                <span>上下</span>
                <input id="pet-control-y" type="range" min="-120" max="120" value="0" />
            </label>
            <label>
                <span>旋轉</span>
                <input id="pet-control-rotation" type="range" min="-30" max="30" value="0" />
            </label>
        </div>

        <div class="pet-filter-actions">
            <button id="btn-pet-generate" class="btn primary" disabled><i data-lucide="scan-face"></i> 自動定位</button>
            <button id="btn-pet-reset" class="btn secondary" disabled><i data-lucide="rotate-ccw"></i> 重設</button>
            <button id="btn-pet-download" class="btn secondary" disabled><i data-lucide="download"></i> 下載</button>
        </div>

        <div class="pet-filter-actions">
            <button id="btn-pet-set-avatar" class="btn primary" style="display:none;" disabled><i data-lucide="image-up"></i> 設為群組頭像</button>
            <button id="btn-pet-adopt" class="btn primary" disabled><i data-lucide="heart"></i> 養它！</button>
        </div>
        <div id="pet-adopt-loading" style="display:none; padding:8px 0; text-align:center;">
            <div class="spinner" style="margin:0 auto 4px; width:20px; height:20px;"></div>
            <p class="hint" style="font-size:0.8rem;">上傳中…</p>
        </div>

        <p id="pet-status" class="hint pet-filter-status">請選擇一張正臉照片。</p>
        <p id="pet-error" class="hint pet-filter-error" style="display:none;"></p>
    </div>

    <button id="btn-pet-swap-back" class="btn secondary" style="margin-top:12px;">返回</button>
</section>
