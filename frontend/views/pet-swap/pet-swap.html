<section id="view-pet-swap" class="view pet-cam-view">
    <div class="pet-cam-stage" id="pet-cam-stage">
        <video id="pet-camera-video" class="pet-cam-video" autoplay muted playsinline></video>
        <canvas id="pet-filter-canvas" class="pet-cam-canvas" aria-label="寵物濾鏡預覽"></canvas>

        <!-- 上傳佔位（沒開鏡頭、沒選照片時） -->
        <div id="pet-upload-placeholder" class="pet-cam-placeholder">
            <i data-lucide="scan-face"></i>
            <span>開啟鏡頭，或左下角上傳照片</span>
            <button id="btn-pet-camera" class="pet-cam-cta"><i data-lucide="video"></i> 開啟鏡頭</button>
        </div>

        <!-- 載入中 -->
        <div id="pet-loading" class="pet-cam-loading" style="display:none;">
            <div class="spinner"></div>
            <span>定位臉部中…</span>
        </div>

        <!-- 頂部列 -->
        <div class="pet-cam-top">
            <button id="btn-pet-swap-back" class="pet-cam-icon" aria-label="返回"><i data-lucide="chevron-down"></i></button>
            <button id="btn-pet-flip" class="pet-cam-icon" aria-label="翻轉鏡頭"><i data-lucide="refresh-cw"></i></button>
        </div>
        <button id="btn-pet-retake" class="pet-cam-icon pet-retake-x" aria-label="重拍" hidden><i data-lucide="x"></i></button>

        <!-- 提示／錯誤 -->
        <div class="pet-cam-toast">
            <p id="pet-status" class="pet-cam-status">開啟鏡頭，左右滑選濾鏡，點中間圓圈拍照。</p>
            <p id="pet-error" class="pet-cam-error" style="display:none;"></p>
        </div>

        <div id="pet-capture-state" class="pet-capture-state" hidden>
            <i data-lucide="pause"></i>
            <span>已拍下</span>
        </div>

        <!-- 底部：上傳 / 濾鏡輪盤(中間=快門) / 收藏 -->
        <div class="pet-cam-bottom">
            <button id="btn-pet-album" class="pet-cam-icon pet-cam-corner" aria-label="上傳照片"><i data-lucide="image"></i></button>

            <div class="pet-filter-carousel" id="pet-filter-carousel">
                <div class="pet-carousel-pad"></div>
                <button class="pet-filter-dot" data-animal="none" title="無濾鏡"><i data-lucide="ban"></i></button>
                <button class="pet-filter-dot active" data-animal="dog" title="狗"><img src="" data-asset="dog" alt="狗" /></button>
                <button class="pet-filter-dot" data-animal="cat" title="貓"><img src="" data-asset="cat" alt="貓" /></button>
                <button class="pet-filter-dot" data-animal="rabbit" title="兔"><img src="" data-asset="rabbit" alt="兔" /></button>
                <button class="pet-filter-dot" data-animal="fox" title="狐"><img src="" data-asset="fox" alt="狐" /></button>
                <button class="pet-filter-dot pet-filter-add" data-animal="add" title="新增 / 上傳"><i data-lucide="plus"></i></button>
                <div class="pet-carousel-pad"></div>
            </div>

            <button id="btn-pet-fav" class="pet-cam-icon pet-cam-corner" aria-label="收藏"><i data-lucide="heart"></i></button>
        </div>

        <input id="pet-album-input" type="file" accept="image/*" style="display:none;" />
        <input id="pet-custom-input" type="file" accept="image/*" style="display:none;" />
    </div>

    <!-- 拍照後動作（底部彈出） -->
    <div id="pet-result-sheet" class="pet-sheet" hidden>
        <div class="pet-sheet-grip"></div>
        <div class="pet-sheet-body">
            <div class="pet-filter-controls" id="pet-filter-controls" aria-label="濾鏡微調">
                <label><span>大小</span><input id="pet-control-scale" type="range" min="70" max="160" value="100" /></label>
                <label><span>左右</span><input id="pet-control-x" type="range" min="-160" max="160" value="0" /></label>
                <label><span>上下</span><input id="pet-control-y" type="range" min="-160" max="160" value="0" /></label>
                <label><span>旋轉</span><input id="pet-control-rotation" type="range" min="-30" max="30" value="0" /></label>
            </div>
            <div class="pet-sheet-actions">
                <button id="btn-pet-generate" class="btn secondary" disabled><i data-lucide="scan-face"></i> 自動定位</button>
                <button id="btn-pet-reset" class="btn secondary" disabled><i data-lucide="rotate-ccw"></i> 重設</button>
            </div>
            <div class="pet-sheet-actions">
                <label class="pet-create-field" id="pet-create-name-field">
                    <span>寵物名字</span>
                    <input id="pet-create-name" type="text" maxlength="20" placeholder="幫牠取一個名字" autocomplete="off">
                    <small id="pet-create-name-error">建立後仍可再次改名</small>
                </label>
                <button id="btn-pet-set-avatar" class="btn primary" style="display:none;" disabled><i data-lucide="paw-print"></i> 建立群組寵物</button>
            </div>
        </div>
    </div>

</section>
