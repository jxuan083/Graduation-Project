<section id="view-groups" class="view">

    <div class="page-header">
        <button id="btn-groups-back" class="btn-back">
            <svg width="16" height="13" viewBox="0 0 26 14.73" fill="none"><path d="M25 7.36H1M1 7.36L8 1M1 7.36L8 13.73" stroke="#4f351a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="page-title">加入 / 建立群組</span>
    </div>

    <div class="scroll-body scroll-pad" style="padding-top:4px;padding-bottom:32px;">

        <div class="jg-card">
            <p class="jg-card-title">輸入邀請碼</p>
            <input class="jg-input" id="jg-invite-code" type="text" placeholder="輸入邀請碼（例如：PPP-7X4K）" style="width:100%;margin-bottom:12px;">
            <button class="btn-primary" id="btn-jg-join" style="width:100%;height:48px;font-size:15px;">加入群組</button>
        </div>

        <div class="jg-divider"><span>或</span></div>

        <div class="jg-card">
            <p class="jg-card-title">群組名稱</p>
            <input class="jg-input" id="jg-new-name" type="text" maxlength="40" placeholder="幫群組取個名字…" style="width:100%;margin-bottom:20px;">
            <p class="jg-card-title">邀請好友加入</p>
            <p class="jg-card-hint">選擇想邀請的好友，建立後會直接加入群組</p>
            <div class="jg-friend-list" id="jg-friend-list">
                <p class="hint" id="jg-friend-hint">載入好友中…</p>
            </div>
            <button class="btn-primary" id="btn-jg-create" style="margin-top:20px;width:100%;">建立群組</button>
        </div>

    </div>
</section>
