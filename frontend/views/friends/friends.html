<section id="view-friends" class="view page-view">

    <div class="page-header">
        <button id="btn-friends-back" class="btn-back">←</button>
        <span class="page-title">好友</span>
    </div>

    <div class="tabs">
        <button id="friends-tab-list"     class="tab-btn active">👥 我的好友 (<span id="friends-count">0</span>)</button>
        <button id="friends-tab-incoming" class="tab-btn">📩 收到邀請 (<span id="friends-incoming-count">0</span>)</button>
        <button id="friends-tab-add"      class="tab-btn">➕ 加好友</button>
    </div>

    <div id="friends-list-pane" class="friends-pane">
        <div id="friends-list" class="friends-list"></div>
        <p id="friends-empty-hint" class="hint" style="display:none; margin-top:24px;">還沒有好友，到「加好友」頁面邀請別人加入吧！</p>
    </div>

    <div id="friends-incoming-pane" class="friends-pane" style="display:none;">
        <div id="friends-incoming-list" class="friends-list"></div>
        <p id="friends-incoming-empty" class="hint" style="display:none; margin-top:24px;">目前沒有待處理的邀請</p>
    </div>

    <div id="friends-add-pane" class="friends-pane" style="display:none;">
        <div class="setup-section">
            <h3>新增好友</h3>
            <p class="hint" style="margin-bottom:10px;">輸入對方的 Email 來送邀請</p>
            <input id="friends-add-email" class="text-input" type="email" placeholder="friend@example.com" />
            <button id="btn-send-friend-req" class="btn primary" style="margin-top:12px; border-radius:var(--r-sm);">送出邀請</button>
            <p id="friends-add-msg" class="hint" style="margin-top:8px;"></p>
        </div>

        <div style="margin-top:8px;">
            <p style="font-size:0.85rem; font-weight:600; color:var(--text-secondary); margin-bottom:8px;">已送出邀請</p>
            <div id="friends-outgoing-list" class="friends-list"></div>
        </div>
    </div>

</section>
