<section id="view-group-chat" class="view">

    <div class="page-header">
        <button id="btn-gc-back" class="btn-back">
            <svg width="16" height="13" viewBox="0 0 26 14.73" fill="none"><path d="M25 7.36H1M1 7.36L8 1M1 7.36L8 13.73" stroke="#4f351a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="page-title" id="gc-title">群組聊天室</span>
    </div>

    <div class="chat-list" id="gc-list">
        <p class="hint" id="gc-loading" style="text-align:center;margin-top:24px;">載入訊息中…</p>
    </div>

    <div class="chat-input-bar">
        <input class="chat-input" id="gc-input" type="text" placeholder="輸入訊息…" maxlength="500" autocomplete="off">
        <button class="chat-send-btn" id="gc-send" aria-label="送出">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 8H2M14 8L9 3M14 8L9 13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>

</section>
