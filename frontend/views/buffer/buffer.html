<section id="view-buffer" class="view overlay">
    <div class="buffer-content">
        <h2><i data-lucide="alert-triangle"></i> 分心提醒</h2>
        <h1 id="buffer-timer" class="timer">15</h1>
        <p>請在倒數結束前蓋上手機！</p>
        <p class="buffer-hint">蓋上手機就不會被計入分心</p>
        <button id="btn-buffer-back" class="btn primary" style="margin-top:24px; max-width:280px;">我回來專心了</button>
        <p class="hint" style="margin-top:8px;">（按下可關閉提醒，不計入分心）</p>
    </div>
</section>
