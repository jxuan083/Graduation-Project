<section id="view-summary" class="view">
    <div class="ps-top-strip"></div>

    <div class="ps-body">
        <p class="ps-pre-title">PARTY RECAP</p>
        <p class="ps-title">聚會總結 🎉</p>

        <!-- 吉祥物卡 -->
        <div class="ps-mascot-card">
            <div class="ps-mascot-scene">
                <div class="ps-mascot-sun"></div>
                <div class="ps-mascot-emoji">🦁</div>
            </div>
            <div class="ps-mascot-text">
                大家今天都很棒，繼續保持！<br>
                <span class="ps-mascot-sub">下次聚會再一起加油 💪</span>
            </div>
        </div>

        <!-- 統計（真實資料：時長 + 我的分數 + 我的分心次數） -->
        <div class="ps-stats">
            <div class="ps-stat-card"><p class="ps-stat-val" id="summary-time">0</p><p class="ps-stat-label">分鐘</p></div>
            <div class="ps-stat-card"><p class="ps-stat-val" id="summary-score">0</p><p class="ps-stat-label">我的分數</p></div>
            <div class="ps-stat-card"><p class="ps-stat-val" id="summary-deviations">0</p><p class="ps-stat-label">次分心（我）</p></div>
        </div>
        <p id="summary-host-hint" style="display:none;"></p>

        <!-- 聚會分數排行（由 wsHandlers 填入 #summary-score-list） -->
        <div class="ps-rank-section" id="summary-score-ranking" style="display:none;">
            <p class="ps-rank-label">聚會分數排行</p>
            <ul id="summary-score-list"></ul>
        </div>
    </div>

    <div class="ps-footer">
        <button class="btn-primary" type="button" onclick="location.href='/'">回到首頁</button>
    </div>
</section>
