<section id="view-join" class="view">
            <h2>加入聚會</h2>
            <p>輸入一個暱稱讓大家認得你</p>
            <div class="profile-card">
                <label class="profile-label" for="join-nickname">你的暱稱</label>
                <input id="join-nickname" type="text" maxlength="20" class="profile-input" placeholder="例如：小明" />
                <p class="hint" id="join-login-hint" style="margin-top:8px;">💡 登入 Google 帳號可自動使用你的頭像和暱稱</p>
            </div>
            <button id="btn-confirm-join" class="btn primary">加入聚會</button>
            <button id="btn-cancel-join" class="btn secondary">取消</button>
        </section>
