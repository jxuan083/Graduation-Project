<section id="view-home" class="view active">

    <!-- 好友邀請提示橫幅（chrome.js 控制顯示） -->
    <div id="incoming-banner" class="incoming-banner" style="display:none;">
        <div class="incoming-banner-icon"><i data-lucide="mail"></i></div>
        <div class="incoming-banner-text">
            <div class="incoming-banner-title">你有 <span id="incoming-banner-count">0</span> 筆好友邀請待處理</div>
            <div id="incoming-banner-sub" class="incoming-banner-sub"></div>
        </div>
        <button id="btn-incoming-banner-view" class="btn-mini primary">查看</button>
    </div>

    <!-- 頂列：題庫（右上帳號由常駐 auth chip 顯示，比照現有專案） -->
    <div class="top-row">
        <button id="btn-question-library" class="btn-book" aria-label="題庫管理">
            <svg width="20" height="24" viewBox="0 0 20 24" fill="none">
                <path d="M2 2h13a2 2 0 0 1 2 2v15a2 2 0 0 1-2 2H2" stroke="#4f351a" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M2 2a1 1 0 0 0-1 1v18a1 1 0 0 0 1 1h13" stroke="#4f351a" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M5 8h8M5 12h8M5 16h5" stroke="#4f351a" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <!-- 搜尋 -->
    <div class="search-row">
        <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
                <circle cx="11" cy="11" r="7" stroke="#9b7955" stroke-width="1.8"/>
                <path d="M16.5 16.5L21 21" stroke="#9b7955" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input id="home-search" type="text" placeholder="搜尋群組…" autocomplete="off">
        </div>
    </div>

    <!-- 群組九宮格（由 home.js 依 /api/groups 動態渲染） -->
    <div class="groups-scroll">
        <div class="groups-grid" id="home-groups-grid"></div>
        <div class="home-empty" id="home-groups-empty" style="display:none;">
            <div class="home-empty-emoji">🐾</div>
            <p class="home-empty-title">還沒有任何群組</p>
            <p class="home-empty-desc">點下方「群組」建立或加入一個群組，<br>揪朋友一起放下手機聚一聚吧！</p>
        </div>
        <div class="home-empty" id="home-groups-guest" style="display:none;">
            <div class="home-empty-emoji">🔥</div>
            <p class="home-empty-title">登入後看看你的群組</p>
            <p class="home-empty-desc">用右上角的 Google 登入，<br>就能建立群組、發起聚會。</p>
        </div>
    </div>

    <!-- 底部 4 顆功能列 -->
    <div class="bottom-bar">
        <button class="btn-bottom btn-bottom-create" id="btn-create-room">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
                <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            發起聚會
        </button>
        <button class="btn-bottom btn-bottom-join" id="btn-scan-qr">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            加入聚會
        </button>
        <button class="btn-bottom btn-bottom-schedule" id="btn-home-schedule">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
                <path d="M8 2v4M16 2v4M3 10h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8 14h2M13 14h2M8 18h2M13 18h2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            預約聚會
        </button>
        <button class="btn-bottom btn-bottom-group" id="btn-open-groups">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="9" cy="7" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
                <path d="M3 21c0-3.3 2.7-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                <path d="M16 11v6M13 14h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            群組
        </button>
    </div>

    <!-- 預約聚會（底部彈出，沿用 .ics 產生邏輯） -->
    <div id="home-schedule-sheet" class="pet-sheet" hidden>
        <div class="pet-sheet-grip"></div>
        <div class="pet-sheet-body">
            <h3 class="pet-sheet-title"><i data-lucide="calendar-plus"></i> 預約聚會</h3>
            <label class="pet-field"><span>聚會名稱</span>
                <input id="sch-title" type="text" placeholder="例如：週五放下手機聚一聚" maxlength="40" /></label>
            <label class="pet-field"><span>時間</span>
                <input id="sch-time" type="datetime-local" /></label>
            <label class="pet-field"><span>地點（選填）</span>
                <input id="sch-place" type="text" placeholder="例如：路易莎信義店" maxlength="60" /></label>
            <div class="pet-sheet-actions">
                <button id="btn-sch-cancel" class="btn secondary">取消</button>
                <button id="btn-sch-ics" class="btn primary"><i data-lucide="calendar-check"></i> 加入行事曆並邀請</button>
            </div>
            <p class="hint" style="font-size:0.78rem; margin-top:6px;">會產生一個 .ics 邀請檔，可加進行事曆、傳給朋友。</p>
        </div>
    </div>

</section>
