<section id="view-taboo-prepare" class="view">
    <div style="font-size:3rem; margin-bottom:8px;">🎯</div>
    <h2>關鍵字遊戲</h2>

    <div class="setup-section" style="text-align:left; margin-top:8px;">
        <h3>玩法說明</h3>
        <p style="margin-bottom:8px; font-size:0.92rem; color:var(--text-primary);">
            1. 點下方按鈕後 <strong>5 秒</strong>內把手機放在<strong>額頭上</strong>，螢幕朝外給其他人看。
        </p>
        <p style="margin-bottom:8px; font-size:0.92rem; color:var(--text-primary);">
            2. 其他人會看到你頭上的關鍵字，用各種方式誘導你說出它。
        </p>
        <p style="font-size:0.92rem; color:var(--text-primary);">
            3. 一旦說出關鍵字就<strong>輸了</strong>，輸家自己拿回手機按「我輸了 / 換下一張」。
        </p>
    </div>

    <button id="btn-taboo-draw" class="btn primary taboo-big-btn" style="margin-top:8px;">🎴 抽取字卡</button>
    <p class="hint" id="taboo-prepare-hint">準備好了再按，按下後立刻把手機放上額頭！</p>

    <div id="taboo-host-controls" style="display:none; width:100%; margin-top:16px;">
        <button id="btn-end-taboo" class="btn secondary">⏹ 結束關鍵字遊戲</button>
    </div>
</section>
