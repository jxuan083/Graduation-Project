<section id="view-taboo-prepare" class="view">
            <h2>🎯 關鍵字遊戲</h2>
            <div class="taboo-rules-card">
                <h3>玩法說明</h3>
                <p>1. 點下方按鈕後 <strong>5 秒</strong> 內把手機放在<strong>額頭上</strong>,螢幕朝外給其他人看。</p>
                <p>2. 其他人會看到你頭上的關鍵字,並用各種方式誘導你說出它。</p>
                <p>3. 一旦你說出關鍵字就<strong>輸了</strong>,輸家自己拿回手機按「我輸了 / 換下一張」。</p>
            </div>
            <button id="btn-taboo-draw" class="btn primary taboo-big-btn">🎴 抽取字卡</button>
            <p class="hint" id="taboo-prepare-hint">準備好了再按,按下後立刻把手機放上額頭!</p>

            <!-- 房主才看得到 -->
            <div id="taboo-host-controls" style="display:none; width:100%; margin-top:24px;">
                <button id="btn-end-taboo" class="btn secondary">⏹ 結束關鍵字遊戲</button>
            </div>
        </section>
