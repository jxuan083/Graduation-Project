<section id="view-meeting-setup" class="view page-view">

    <div class="page-header">
        <button id="btn-cancel-setup" class="btn-back">←</button>
        <span class="page-title">發起聚會</span>
    </div>

    <div class="setup-section">
        <h3>聚會情境</h3>
        <div id="context-grid" class="context-grid"></div>
    </div>

    <div class="setup-section">
        <h3>手機管制強度</h3>
        <div class="difficulty-btns">
            <button class="btn secondary diff-btn" data-diff="L"><i data-lucide="leaf"></i> 輕鬆</button>
            <button class="btn secondary diff-btn active-diff" data-diff="M"><i data-lucide="scale"></i> 標準</button>
            <button class="btn secondary diff-btn" data-diff="H"><i data-lucide="flame"></i> 嚴格</button>
        </div>
        <p id="difficulty-hint" class="hint" style="margin-top:8px;"></p>
    </div>

    <div class="setup-section">
        <h3>預計時長（分鐘）</h3>
        <input id="duration-input" type="number" class="text-input" min="10" max="480" value="90" />
    </div>

    <div class="setup-section" id="group-select-section">
        <h3>綁定群組 <span class="hint" style="text-transform:none;">（可選）</span></h3>
        <select id="group-select" class="text-input">
            <option value="">— 不綁定群組 —</option>
        </select>
    </div>

    <button id="btn-confirm-setup" class="btn primary" style="margin-top:8px;">建立房間</button>

</section>
