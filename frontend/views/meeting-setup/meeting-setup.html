<section id="view-meeting-setup" class="view page-view">

    <div class="page-header">
        <button id="btn-cancel-setup" class="btn-back" aria-label="返回">
            <svg width="16" height="13" viewBox="0 0 26 14.73" fill="none"><path d="M25 7.36H1M1 7.36L8 1M1 7.36L8 13.73" stroke="#4f351a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="page-title">發起聚會</span>
    </div>

    <!-- 選擇場景（真實 context，由 buildContextGrid 從 CONTEXT_CONFIGS 產生） -->
    <p class="cp-section-label">選擇場景</p>
    <div id="context-grid" class="cp-situation-grid"></div>

    <!-- 手機管制強度 -->
    <p class="cp-section-label">手機管制強度</p>
    <div class="cp-level-btns">
        <button class="cp-level-btn diff-btn active-diff" data-diff="L" type="button">輕鬆</button>
        <button class="cp-level-btn diff-btn" data-diff="M" type="button">標準</button>
        <button class="cp-level-btn diff-btn" data-diff="H" type="button">嚴格</button>
    </div>
    <p id="difficulty-hint" class="cp-level-desc"></p>

    <!-- 選擇群組（自訂下拉，選項由 fetchMyGroups 真實載入） -->
    <p class="cp-section-label">選擇群組 <span class="cp-optional">（可選）</span></p>
    <div class="cp-dropdown-wrap">
        <button class="cp-dropdown-btn" id="cp-group-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="cp-dropdown-val placeholder" id="cp-group-val">選擇一個群組…</span>
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1L6 6L11 1" stroke="rgba(79,53,26,0.4)" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="cp-dropdown-list" id="cp-group-list" role="listbox" hidden></div>
    </div>

    <button class="btn-primary" id="btn-confirm-setup" type="button" style="margin-top:24px;">建立聚會室</button>

</section>
