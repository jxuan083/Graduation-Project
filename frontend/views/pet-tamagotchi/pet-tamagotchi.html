<section id="view-pet-tamagotchi" class="view">

    <!-- 寵物列表 -->
    <div id="pet-list-screen" style="display:none; width:100%;">
        <div class="pet-list-header">
            <h2>群組寵物</h2>
            <button id="btn-pet-list-back" class="btn secondary" style="padding:6px 14px; font-size:0.85rem;">返回</button>
        </div>
        <div id="pet-list-empty" class="pet-no-pet-card" style="display:none;">
            <div class="pet-empty-icon"><i data-lucide="paw-print"></i></div>
            <h2>還沒有群組寵物</h2>
            <p>請先加入群組，並在群組設定中建立寵物。</p>
        </div>
        <div id="pet-list-cards" class="pet-list-cards"></div>
    </div>

    <!-- 尚無寵物 -->
    <div id="pet-no-pet" class="pet-no-pet-card" style="display:none;">
        <div class="pet-empty-icon"><i data-lucide="paw-print"></i></div>
        <h2 id="pet-no-pet-title">還沒有寵物</h2>
        <p id="pet-no-pet-desc">請先在群組設定頁生成並設定寵物臉！</p>
        <button id="btn-pet-tama-back-nopet" class="btn secondary" style="width:100%;">返回</button>
    </div>

    <!-- 主遊戲畫面 -->
    <div id="pet-game-wrap" class="pet-game-wrap" style="display:none;">

        <!-- 群組 badge（群組模式才顯示） -->
        <div id="pet-group-badge" class="pet-group-badge" style="display:none;">
            <i data-lucide="users" style="width:12px;height:12px;"></i>
            <span id="pet-group-name">群組寵物</span>
        </div>

        <!-- 名稱列 -->
        <div class="pet-name-row">
            <h2 id="pet-tama-name">群組寵物</h2>
            <button id="btn-pet-rename" style="display:none;"><i data-lucide="pencil"></i> 改名</button>
            <button id="btn-pet-delete" style="display:none;"><i data-lucide="trash-2"></i></button>
        </div>

        <div class="pet-growth-panel" aria-label="寵物成長進度">
            <div class="pet-level-mark">
                <span>LV</span>
                <strong id="pet-level">1</strong>
            </div>
            <div class="pet-growth-main">
                <div class="pet-growth-meta">
                    <span id="pet-stage-label">幼年期</span>
                    <span id="pet-xp-label">0 / 100 XP</span>
                </div>
                <div class="pet-xp-track" role="progressbar" aria-label="升級進度" aria-valuemin="0" aria-valuemax="100">
                    <div id="pet-xp-fill" class="pet-xp-fill"></div>
                </div>
                <div class="pet-growth-foot">
                    <span><i data-lucide="calendar-check"></i><b id="pet-meeting-count">0</b> 次共同聚會</span>
                    <span id="pet-last-reward" style="display:none;"></span>
                </div>
            </div>
        </div>

        <div id="pet-unlocks" class="pet-unlocks" style="display:none;" aria-label="已解鎖收藏">
            <span class="pet-unlocks-label">共同回憶</span>
            <div id="pet-unlock-items" class="pet-unlock-items"></div>
        </div>

        <!-- 舞台 -->
        <div class="pet-stage" id="pet-stage">
            <!-- 換背景按鈕 -->
            <button id="btn-change-bg" class="pet-bg-btn" title="更換背景" aria-expanded="false" aria-controls="pet-bg-picker">
                <i data-lucide="image"></i>
                <span>場景</span>
            </button>

            <div id="pet-status-chip" class="pet-status-chip">
                <i data-lucide="circle-check"></i>
                <span>狀態良好</span>
            </div>
            <div id="pet-speech" class="pet-speech">汪汪！</div>
            <div class="pet-ground-shadow" aria-hidden="true"></div>
            <div id="pet-avatar-wrap" class="pet-avatar-wrap state-idle">
                <img id="pet-avatar-img" src="" alt="寵物" />
            </div>
            <div id="pet-rescue-overlay" class="pet-rescue-overlay" style="display:none;">
                <div class="pet-cage" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="pet-rescue-copy">
                    <strong>等你們來救我</strong>
                    <span>完成一場群組聚會，牢籠就會打開</span>
                </div>
            </div>
            <div id="pet-reaction-layer" class="pet-reaction-layer" aria-hidden="true"></div>
        </div>

        <!-- 背景選擇面板 -->
        <div id="pet-bg-picker" class="pet-bg-picker" style="display:none;" aria-label="選擇寵物生活場景">
            <div class="pet-bg-picker-head">
                <div>
                    <strong>生活場景</strong>
                    <span>每個群組都能有自己的空間</span>
                </div>
                <button id="btn-close-bg-picker" type="button" aria-label="關閉場景選擇"><i data-lucide="x"></i></button>
            </div>
            <div class="pet-bg-options">
                <button class="bg-opt" data-bg="default">
                    <span class="bg-opt-preview scene-sunroom"><i data-lucide="check" class="bg-opt-check"></i></span>
                    <span class="bg-opt-name">晨光起居室</span>
                </button>
                <button class="bg-opt" data-bg="terrace">
                    <span class="bg-opt-preview scene-terrace"><i data-lucide="check" class="bg-opt-check"></i></span>
                    <span class="bg-opt-name">黃昏露台</span>
                </button>
                <label class="bg-opt bg-upload-label">
                    <span id="bg-upload-preview" class="bg-opt-preview scene-custom"><i data-lucide="camera"></i></span>
                    <span class="bg-opt-name">我的照片</span>
                    <span class="bg-opt-sub">上傳或替換</span>
                    <input type="file" id="bg-upload-input" accept="image/*" style="display:none;">
                </label>
            </div>
            <div class="pet-bg-picker-foot">
                <span><i data-lucide="shield-check"></i>照片只儲存在這台裝置</span>
                <button id="btn-reset-bg-position" type="button" style="display:none;">重設構圖</button>
            </div>
        </div>
        <!-- 自訂背景拖曳提示 -->
        <div id="pet-bg-drag-hint" class="pet-bg-drag-hint" style="display:none;">
            <i data-lucide="move" style="width:13px;height:13px;"></i>
            <span>拖曳舞台可調整背景位置</span>
        </div>

        <div id="pet-group-stats" class="pet-stats">
            <div class="pet-hp-row">
                <div class="stat-label" style="width:auto; margin-right:6px;">
                    <i data-lucide="heart" class="stat-icon happiness-icon"></i>
                    <span>HP</span>
                </div>
                <div class="pet-hp-hearts" id="pet-hp-hearts"></div>
            </div>
            <div class="stat-row">
                <div class="stat-label">
                    <i data-lucide="utensils" class="stat-icon energy-icon"></i>
                    <span>飽食</span>
                </div>
                <div class="stat-bar"><div id="fill-group-energy" class="stat-fill energy-fill" style="width:0%"></div></div>
                <span class="stat-val" id="val-group-energy">0</span>
            </div>
            <div class="stat-row">
                <div class="stat-label">
                    <i data-lucide="smile" class="stat-icon happiness-icon"></i>
                    <span>快樂</span>
                </div>
                <div class="stat-bar"><div id="fill-group-happiness" class="stat-fill happiness-fill" style="width:0%"></div></div>
                <span class="stat-val" id="val-group-happiness">0</span>
            </div>
            <div class="stat-row">
                <div class="stat-label">
                    <i data-lucide="sparkles" class="stat-icon clean-icon"></i>
                    <span>清潔</span>
                </div>
                <div class="stat-bar"><div id="fill-group-clean" class="stat-fill clean-fill" style="width:0%"></div></div>
                <span class="stat-val" id="val-group-clean">0</span>
            </div>
        </div>

        <!-- 動作按鈕 -->
        <div class="pet-actions">
            <button id="btn-pet-feed" class="pet-action-btn feed-btn">
                <i data-lucide="utensils"></i>
                <span class="pet-action-label">餵食</span>
                <small id="pet-feed-state">可互動</small>
            </button>
            <button id="btn-pet-wipe" class="pet-action-btn wipe-btn">
                <i data-lucide="wind"></i>
                <span class="pet-action-label">清潔</span>
                <small id="pet-wipe-state">可互動</small>
            </button>
            <button id="btn-pet-play" class="pet-action-btn play-btn">
                <i data-lucide="gamepad-2"></i>
                <span class="pet-action-label">玩耍</span>
                <small id="pet-play-state">可互動</small>
            </button>
        </div>
        <div id="pet-action-feedback" class="pet-action-feedback" role="status" aria-live="polite"></div>

        <button id="btn-pet-tama-back" class="btn secondary" style="width:100%; margin-top:4px;">返回</button>
    </div>

    <!-- 載入中：骨架尺寸對齊實際畫面，避免版面跳動 -->
    <div id="pet-tama-loading" class="pet-loading-skeleton" aria-label="載入寵物中">
        <div class="pet-skeleton-line short"></div>
        <div class="pet-skeleton-stage"></div>
        <div class="pet-skeleton-line"></div>
        <div class="pet-skeleton-actions"><span></span><span></span><span></span></div>
    </div>

    <div id="pet-tama-error" class="pet-no-pet-card" style="display:none;" role="alert">
        <div class="pet-empty-icon is-error"><i data-lucide="cloud-off"></i></div>
        <h2>寵物狀態載入失敗</h2>
        <p id="pet-error-message">請檢查網路後再試一次。</p>
        <button id="btn-pet-retry" class="btn primary" style="width:100%;">重新載入</button>
    </div>

    <!-- 改名 Overlay（群組建立者） -->
    <div id="pet-rename-overlay" class="pet-rename-overlay" style="display:none;">
        <div class="pet-rename-box">
            <h3>幫寵物改名</h3>
            <input id="pet-rename-input" type="text" maxlength="20" placeholder="輸入名字（最多 20 字）" />
            <div style="display:flex; gap:8px;">
                <button id="btn-rename-confirm" class="btn primary" style="flex:1;">確認</button>
                <button id="btn-rename-cancel"  class="btn secondary" style="flex:1;">取消</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 Overlay（群組寵物，建立者限定） -->
    <div id="pet-delete-overlay" class="pet-rename-overlay" style="display:none;">
        <div class="pet-rename-box">
            <h3 id="pet-delete-title">確定要刪除群組寵物？</h3>
            <p class="hint" style="margin:4px 0 12px;">刪除後所有養成數值都會消失，無法復原。只有重新設定才能再養。</p>
            <div style="display:flex; gap:8px;">
                <button id="btn-delete-confirm" class="btn primary" style="flex:1; background:#dc2626; border-color:#dc2626;">刪除</button>
                <button id="btn-delete-cancel"  class="btn secondary" style="flex:1;">取消</button>
            </div>
        </div>
    </div>

</section>
