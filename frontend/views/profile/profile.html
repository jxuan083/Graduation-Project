<section id="view-profile" class="view page-view">

    <div class="page-header">
        <button id="btn-profile-back" class="btn-back">←</button>
        <span class="page-title">個人資料</span>
    </div>

    <div class="setup-section" style="display:flex; flex-direction:column; align-items:center; gap:12px; padding:24px 18px;">
        <img id="profile-avatar-preview" class="profile-avatar" src="" alt="avatar" />
        <label for="profile-avatar-input" class="btn secondary" style="cursor:pointer; width:auto; padding:10px 20px; margin-bottom:0; border-radius:var(--r-sm);">更換頭像</label>
        <input id="profile-avatar-input" type="file" accept="image/*" style="display:none;" />
    </div>

    <div class="setup-section">
        <h3>用戶 ID</h3>
        <input id="profile-handle" type="text" maxlength="20" class="text-input" placeholder="設定你的專屬 ID（如：chmstjs）" autocapitalize="off" autocomplete="off" spellcheck="false" />
        <p class="hint" style="margin-top:6px;">3–20 個小寫英文、數字或底線。朋友可用這個 ID 或你的 QR Code 加你。</p>
    </div>

    <div class="setup-section">
        <h3>暱稱</h3>
        <input id="profile-nickname" type="text" maxlength="30" class="text-input" placeholder="顯示名稱" />
    </div>

    <div class="setup-section">
        <h3>自我介紹</h3>
        <textarea id="profile-bio" maxlength="200" class="text-input" rows="3" placeholder="一句話介紹自己（最多 200 字）"></textarea>
    </div>

    <div class="setup-section">
        <h3>興趣標籤</h3>
        <p class="hint" style="margin-top:0;">最多可選 5 個，會顯示在你的個人頁</p>
        <div id="profile-interests-selected" class="interest-chips interest-selected"></div>
        <div id="profile-interests-presets" class="interest-chips"></div>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <input id="profile-interest-input" type="text" maxlength="12" class="text-input" placeholder="自訂標籤（如：手沖咖啡）" style="flex:1; margin-bottom:0;" autocomplete="off">
            <button id="btn-interest-add" class="btn secondary" style="width:auto; padding:10px 18px; margin-bottom:0; border-radius:var(--r-sm);">新增</button>
        </div>
    </div>

    <p id="profile-status" class="profile-status" style="text-align:center; margin-bottom:12px;"></p>
    <button id="btn-profile-save" class="btn primary">儲存</button>

</section>
