<section id="view-meeting-detail" class="view">
            <h2 id="meeting-detail-title">聚會詳情</h2>
            <div class="summary-card">
                <p>主辦人: <span id="md-host">-</span></p>
                <p>聚會模式: <span id="md-mode">-</span></p>
                <p>持續時間: <span id="md-duration">-</span> 分鐘</p>
                <p>分心次數: <span id="md-deviations">-</span> 次</p>
                <p>結束時間: <span id="md-time">-</span></p>
                <p>結束原因: <span id="md-reason">-</span></p>
                <h3 style="margin-top:20px; margin-bottom:8px;">參與成員 (<span id="md-count">0</span>)</h3>
                <ul id="md-members" class="member-ul"></ul>

                <div id="md-deviation-ranking-section" style="display:none; margin-top:20px;">
                    <h3 style="margin-bottom:8px;"><i data-lucide="phone-off"></i> 分心排行榜</h3>
                    <ul id="md-deviation-ranking" style="list-style:none; padding:0; margin:0;"></ul>
                </div>

                <h3 style="margin-top:20px; margin-bottom:8px;">聚會照片 (<span id="md-photo-count">0</span>/10)</h3>
                <div id="md-photos-grid" class="photos-grid"></div>
                <p id="md-photos-empty" class="hint" style="display:none;">還沒有人上傳照片</p>
                <div id="md-photos-host-controls" style="display:none; margin-top:8px;">
                    <button id="btn-md-camera-photo" class="btn secondary"><i data-lucide="camera"></i> 開啟相機</button>
                    <button id="btn-md-album-photo" class="btn secondary"><i data-lucide="image"></i> 從相簿選擇</button>
                </div>
                <input id="md-camera-input" type="file" accept="image/*" capture="environment" style="display:none;" />
                <input id="md-album-input" type="file" accept="image/*" style="display:none;" />

                <div class="newspaper-panel">
                    <div class="newspaper-header">
                        <div>
                            <p class="newspaper-kicker">AI Party Newspaper</p>
                            <h3>聚會回顧報</h3>
                        </div>
                        <button id="btn-md-generate-newspaper" class="btn primary">產生報紙</button>
                    </div>

                    <div class="transcript-box">
                        <label for="md-transcript-input">對話逐字稿</label>
                        <textarea id="md-transcript-input" rows="5" placeholder="今天那個遊戲很好笑&#10;大家都很投入&#10;照片可以放到回顧裡"></textarea>
                        <div class="transcript-actions">
                            <input id="md-audio-input" type="file" accept="audio/*,video/webm,video/mp4" />
                            <button id="btn-md-transcribe-audio" class="btn secondary" type="button">音檔轉文字</button>
                            <span id="md-transcript-status" class="hint"></span>
                        </div>
                    </div>

                </div>
            </div>
            <button id="btn-meeting-detail-back" class="btn secondary">返回清單</button>
        </section>
