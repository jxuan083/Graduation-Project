<section id="view-sync-ritual" class="view">
    <h2 class="hs-title">一起準備</h2>
    <p class="hs-hint">所有成員持續按住按鈕<br>直到圓圈填滿才能開始</p>

    <div class="hs-ring-wrap">
        <div class="hs-pulse-ring" id="sync-pulse"></div>
        <svg width="260" height="260" viewBox="0 0 260 260" style="position:absolute;">
            <circle cx="130" cy="130" r="110" fill="none" stroke="rgba(79,53,26,0.10)" stroke-width="14"/>
            <circle id="sync-progress-fill" cx="130" cy="130" r="110" fill="none"
                stroke="url(#sync-grad)" stroke-width="14" stroke-linecap="round"
                stroke-dasharray="691.15" stroke-dashoffset="691.15"
                transform="rotate(-90 130 130)"/>
            <defs>
                <linearGradient id="sync-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#AD5793"/>
                    <stop offset="100%" stop-color="#B89825"/>
                </linearGradient>
            </defs>
        </svg>
        <button class="hs-hold-btn" id="btn-sync-hold" type="button">
            <span class="hs-hold-label" id="sync-hold-label">長按</span>
        </button>
    </div>

    <p class="hs-progress-text" id="sync-progress-text">按住按鈕直到圓圈填滿</p>
</section>
